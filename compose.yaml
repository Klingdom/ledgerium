# ─── Ledgerium AI — Docker Compose ────────────────────────────────────────────
#
# Usage:
#   docker compose up -d          # start
#   docker compose logs -f        # view logs
#   docker compose down           # stop
#   docker compose up -d --build  # rebuild and start
#
# Data persistence:
#   All business data is stored in the 'ledgerium-data' volume.
#   This includes the SQLite database and uploaded workflow files.
#   The volume persists across container restarts and rebuilds.
# ──────────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledgerium-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ledgerium-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/data/ledgerium.db
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/data/uploads
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}

volumes:
  ledgerium-data:
    driver: local
