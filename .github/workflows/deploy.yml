name: Build and Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - feature/recorder-v2
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: klingdom/ledgerium

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ledgerium/web-app exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build-and-push:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # RCA-5 fix: pass NEXT_PUBLIC_* vars as Docker build-args so Next.js
          # inlines them at build time. Sourced from GitHub Actions Variables
          # (Settings → Secrets and variables → Actions → Variables tab).
          build-args: |
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: ledgerium
          docker-compose-path: compose.hostinger.yaml
          environment-variables: |
            NODE_ENV=production
            PORT=3000
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL || 'https://ledgerium.ai' }}
            DATABASE_URL=file:/app/data/ledgerium.db
            DATA_DIR=/app/data
            UPLOAD_DIR=/app/data/uploads
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_STARTER_MONTHLY_PRICE_ID=${{ secrets.STRIPE_STARTER_MONTHLY_PRICE_ID }}
            STRIPE_STARTER_ANNUAL_PRICE_ID=${{ secrets.STRIPE_STARTER_ANNUAL_PRICE_ID }}
            STRIPE_TEAM_MONTHLY_PRICE_ID=${{ secrets.STRIPE_TEAM_MONTHLY_PRICE_ID }}
            STRIPE_TEAM_ANNUAL_PRICE_ID=${{ secrets.STRIPE_TEAM_ANNUAL_PRICE_ID }}
            STRIPE_GROWTH_MONTHLY_PRICE_ID=${{ secrets.STRIPE_GROWTH_MONTHLY_PRICE_ID }}
            STRIPE_GROWTH_ANNUAL_PRICE_ID=${{ secrets.STRIPE_GROWTH_ANNUAL_PRICE_ID }}
            STRIPE_PRO_PRICE_ID=${{ secrets.STRIPE_PRO_PRICE_ID }}
            STRIPE_TRIAL_DAYS=${{ vars.STRIPE_TRIAL_DAYS || '14' }}
            DISABLE_ADMIN_BOOTSTRAP=${{ vars.DISABLE_ADMIN_BOOTSTRAP || 'true' }}
            NEXTAUTH_SESSION_MAXAGE=${{ vars.NEXTAUTH_SESSION_MAXAGE || '86400' }}
            DEMO_MODE_DISABLE_TEAMS=${{ vars.DEMO_MODE_DISABLE_TEAMS || 'true' }}
            UMAMI_APP_SECRET=${{ secrets.UMAMI_APP_SECRET }}
            UMAMI_DB_PASSWORD=${{ secrets.UMAMI_DB_PASSWORD }}
