# ─── Ledgerium AI — Hostinger Docker Manager Compose ─────────────────────────
#
# This compose file uses a pre-built image from GitHub Container Registry.
# Used by the GitHub Actions deploy workflow and Hostinger's "Compose from URL".
#
# For local Docker builds, use compose.yaml instead.
# ──────────────────────────────────────────────────────────────────────────────

services:
  web:
    image: ghcr.io/klingdom/ledgerium:latest
    # CRITICAL: always pull the freshly-pushed :latest on every deploy. Without
    # this, `docker compose up -d` reuses the cached local image and the VPS keeps
    # running stale code — "successful" deploys that never actually update the app.
    pull_policy: always
    container_name: ledgerium-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ledgerium-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/data/ledgerium.db
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/data/uploads
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://ledgerium.ai}
      # ── Stripe billing (iter 066-068; env vars set by GitHub Actions → host shell)
      # If unset on the host (no GitHub Secret configured), defaults to empty
      # string; the checkout/webhook routes handle empty gracefully (HTTP 503 /
      # HTTP 500 with BUG-04 retry semantics) instead of throwing at startup.
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_STARTER_MONTHLY_PRICE_ID=${STRIPE_STARTER_MONTHLY_PRICE_ID:-}
      - STRIPE_STARTER_ANNUAL_PRICE_ID=${STRIPE_STARTER_ANNUAL_PRICE_ID:-}
      - STRIPE_TEAM_MONTHLY_PRICE_ID=${STRIPE_TEAM_MONTHLY_PRICE_ID:-}
      - STRIPE_TEAM_ANNUAL_PRICE_ID=${STRIPE_TEAM_ANNUAL_PRICE_ID:-}
      - STRIPE_GROWTH_MONTHLY_PRICE_ID=${STRIPE_GROWTH_MONTHLY_PRICE_ID:-}
      - STRIPE_GROWTH_ANNUAL_PRICE_ID=${STRIPE_GROWTH_ANNUAL_PRICE_ID:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - STRIPE_TRIAL_DAYS=${STRIPE_TRIAL_DAYS:-14}
    networks:
      - proxy-net

  # ── Self-hosted Umami analytics (D-1 decision: self-hosted on Hostinger VPS)
  # Umami runs as its own sidecar on port 3001 (host) → 3000 (container).
  # It uses a dedicated Postgres instance (umami-db) on the same proxy-net.
  # The NEXT_PUBLIC_UMAMI_SCRIPT_URL in the web app points to the analytics
  # subdomain served by the reverse proxy in front of this container.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    depends_on:
      - umami-db
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${UMAMI_APP_SECRET}
      # TRACKER_SCRIPT_NAME keeps the default filename so the browser request
      # to /script.js resolves correctly via the reverse-proxy subdomain.
      - TRACKER_SCRIPT_NAME=script.js
    # Reverse-proxy routing:
    # The external `proxy-net` network means an existing reverse proxy manages
    # TLS + subdomain routing on this VPS. No Traefik/Caddy config was found
    # in the repository — see docs/runbooks/UMAMI_SETUP.md §4 for the three
    # possible approaches depending on which proxy Hostinger provisions.
    # If Traefik is in use, uncomment the labels block below:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.umami.rule=Host(`analytics.ledgerium.ai`)"
    #   - "traefik.http.routers.umami.tls=true"
    #   - "traefik.http.routers.umami.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.umami.loadbalancer.server.port=3000"
    networks:
      - proxy-net

  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    # umami-db is intentionally NOT exposed on host ports — it is only
    # reachable by the `umami` container on the shared proxy-net.
    networks:
      - proxy-net

volumes:
  ledgerium-data:
    driver: local
  # Dedicated volume for Umami's Postgres data. Separate from ledgerium-data
  # so `docker volume rm ledgerium-data` does not affect analytics history.
  umami-db-data:
    driver: local

networks:
  proxy-net:
    external: true
