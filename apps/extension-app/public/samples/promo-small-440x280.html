<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:440px;height:280px;overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.canvas{
  width:440px;height:280px;position:relative;overflow:hidden;
  background:linear-gradient(145deg,#0f172a 0%,#1a2e1a 55%,#0a1628 100%);
  display:flex;align-items:center;justify-content:center;
}

/* Background decoration */
.grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:32px 32px;
}
.glow{
  position:absolute;
  width:320px;height:320px;top:-80px;right:-60px;border-radius:50%;
  background:radial-gradient(circle,rgba(5,150,105,.2) 0%,transparent 70%);
}
.glow2{
  position:absolute;
  width:200px;height:200px;bottom:-60px;left:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.12) 0%,transparent 70%);
}

/* Content */
.content{
  position:relative;z-index:1;
  text-align:center;
  padding:0 32px;
}
.wordmark{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:16px;
}
.logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#059669,#047857);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
  box-shadow:0 4px 12px rgba(5,150,105,.4);
}
.brand-name{
  font-size:20px;font-weight:700;color:#f1f5f9;letter-spacing:-.02em;
}
.brand-sub{
  font-size:11px;font-weight:500;color:#10b981;letter-spacing:.04em;text-transform:uppercase;
}
.tagline{
  font-size:18px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:10px;
}
.tagline span{color:#10b981}
.sub{
  font-size:12px;color:#94a3b8;line-height:1.5;
}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(5,150,105,.15);border:1px solid rgba(5,150,105,.3);
  border-radius:20px;padding:4px 12px;margin-top:14px;
}
.pill-dot{width:5px;height:5px;border-radius:50%;background:#10b981}
.pill-text{font-size:10px;font-weight:600;color:#10b981;letter-spacing:.06em;text-transform:uppercase}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="canvas">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="wordmark">
      <div class="logo-mark">L</div>
      <div>
        <div class="brand-name">Ledgerium</div>
        <div class="brand-sub">AI Recorder</div>
      </div>
    </div>
    <div class="tagline">Record once.<br><span>Understand everything.</span></div>
    <div class="sub">SOPs · Process maps · Cycle time intelligence</div>
    <div class="pill">
      <span class="pill-dot"></span>
      <span class="pill-text">Free to install</span>
    </div>
  </div>
</div>
</body>
</html>
